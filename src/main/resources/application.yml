server:
  port: 8000

spring:
  application:
    name: demo
  datasource:
    url: jdbc:mariadb://localhost:3306/miniproject
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER_CLASS_NAME}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  # Redis 설정 (로컬 Redis 없을 때 주석 처리 또는 embedded-redis 사용)
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password:
#      timeout: 6000ms
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        options:
          model: ${OPEN_AI_MODEL}

  # WebClient 설정
  webclient:
    openweathermap:
      base-url: https://api.openweathermap.org/data/2.5
      timeout: 5000

# Weather API 설정
weather:
  api:
    key: ${OPEN_WEATHER_API_KEY:}
    base-url: https://api.openweathermap.org/data/2.5

# JWT 설정
jwt:
  secret: ${JWT_SECRET_KEY:travel-planner-secret-key-2026-min-256-bits-length}

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.travelplanner.demo
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

lombok:
  addLombokGeneratedAnnotation: true

# 로깅 설정
logging:
  level:
    com.travelplanner.demo: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"